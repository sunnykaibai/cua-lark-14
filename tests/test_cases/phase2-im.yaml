    test_stage: im_attachment_share
    product: IM
    name: 通过更多发送选项发送测试图片
    instruction: 通过更多发送选项把本地图片“{{ASSETS_DIR}}/cua-lark-im-upload-test.png”发给孙浩翔
    expected: 与孙浩翔的聊天记录中出现名为 cua-lark-im-upload-test.png 的图片消息或图片缩略图
    allowed_actions: [click, type_text, hotkey, wait, scroll]
    verification:
      method: final_visual_semantic
      assertion: 孙浩翔聊天窗口中出现测试图片消息，而不是本地路径文本

  - id: IM-P2-025
    phase: phase-2
    test_stage: im_attachment_share
    product: IM
    name: 修正误发路径文本的图片发送
    instruction: 如果我刚才只是把测试图片路径文本发给了孙浩翔，请重新把这张图片作为真正的图片发给他
    expected: 与孙浩翔的聊天记录中出现真实图片消息或图片缩略图，而不是只有本地路径文本
    allowed_actions: [click, type_text, hotkey, wait, scroll]
    verification:
      method: final_visual_semantic
      assertion: 孙浩翔聊天窗口中出现真实图片消息或图片缩略图，不能只出现本地路径文本
