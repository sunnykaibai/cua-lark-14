    instruction: 给孙浩翔发送一条加粗消息“CUA-Lark 加粗格式测试 023”
    expected: 与孙浩翔的聊天记录中出现加粗样式的消息“CUA-Lark 加粗格式测试 023”
    allowed_actions: [click, type_text, hotkey, wait]
    verification:
      method: final_visual_semantic
      assertion: 孙浩翔聊天窗口中出现指定加粗格式消息

  - id: IM-P2-024
