- id: DOCS-R4-L6-CLEAN-PROVISION-001
  phase: phase-2
  test_stage: docs_r4_layer6_clean_provision
  product: Docs
  name: 创建 Layer6 R4 干净测试文档并导入素材
  instruction: 在飞书云文档中新建一个文档，标题设为“CUA-Lark Docs Layer6 R4 Clean 20260501”，然后在正文中粘贴本地 Markdown 素材“{{ASSETS_DIR}}/docs-feature-material.md”的完整内容。如果当前已经打开同名文档且正文已经包含“DOCS-FEATURE-MATERIAL-ROOT-7A2D”和“DOCS-FEATURE-COMPOSITION-HEADING-2F4C”，直接完成；否则必须创建或打开这个同名文档并补齐素材正文。
  expected: 当前浏览器或飞书云文档页面打开“CUA-Lark Docs Layer6 R4 Clean 20260501”，正文包含 DOCS-FEATURE-MATERIAL-ROOT-7A2D 和组合功能锚点
  input_materials:
  - path: '{{ASSETS_DIR}}/docs-feature-material.md'
    label: docs-feature-material.md
  allowed_actions:
  - click
  - type_text
  - hotkey
  - wait
  - scroll
  verification:
    method: final_visual_semantic
    assertion: 当前页面是“CUA-Lark Docs Layer6 R4 Clean 20260501”，正文中可见“DOCS-FEATURE-MATERIAL-ROOT-7A2D”和“DOCS-FEATURE-COMPOSITION-HEADING-2F4C”或多个
      DOCS-FEATURE-COMP 所需锚点，且不是旧文档“CUA-Lark Docs 测试文档 DOCS-P2-001”。
- id: DOCS-FEAT-COMP-001
  phase: phase-2
  test_stage: docs_realistic_composition
  product: Docs
  name: 在锚点后插入三列表格
  instruction: 打开“CUA-Lark Docs Layer6 R4 Clean 20260501”，找到“DOCS-FEATURE-TABLE-ANCHOR-3C2A”，在它后面插入一个三列两行以上的表格，表头为“事项、负责人、状态”，并在下一行数据行填入“素材复核、测试扩展、完成”。表头和数据必须在不同表格行，中间要有可见横向行边界；如果看到“事项/素材复核”“负责人/测试扩展”“状态/完成”上下堆在同一批单元格里，下面还有空行，这不是通过，必须修复。
  expected: 指定锚点后出现包含表头和数据的真实表格，表头行与数据行由横向网格线分隔
  input_materials:
  - path: '{{ASSETS_DIR}}/docs-feature-material.md'
    label: docs-feature-material.md
  allowed_actions:
  - click
  - type_text
  - hotkey
  - wait
  - scroll
  verification:
    method: final_visual_semantic
    assertion: “DOCS-FEATURE-TABLE-ANCHOR-3C2A”后可见表格网格或表格结构，且同一表格内可见“事项”“负责人”“状态”“素材复核”“测试扩展”“完成”；“事项/负责人/状态”必须在表头行，“素材复核/测试扩展/完成”必须在下一行数据行，两行之间必须有可见横向网格线；如果这些文字只是上下堆在同一批单元格中且下方为空行，则判为失败；页面标题或文档标题应对应“CUA-Lark Docs
      Layer6 R4 Clean 20260501”，不能是旧文档“CUA-Lark Docs 测试文档 DOCS-P2-001”。
